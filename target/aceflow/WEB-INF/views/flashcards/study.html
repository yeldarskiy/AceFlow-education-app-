<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Flashcards - AceFlow</title>
    <link rel="stylesheet" th:href="@{/static/css/main.css}">
    <style>
        .study-wrap { max-width:560px; margin:0 auto; padding:24px; }
        .fc-scene { width:100%; perspective:1200px; margin-bottom:20px; }
        .fc-inner { width:100%; height:260px; position:relative; transform-style:preserve-3d; transition:transform .5s ease; cursor:pointer; }
        .fc-inner.flipped { transform:rotateY(180deg); }
        .fc-face { position:absolute; inset:0; backface-visibility:hidden; border-radius:14px; display:flex; align-items:center; justify-content:center; flex-direction:column; padding:28px; box-shadow:var(--shadow-md); border:1px solid var(--border); }
        .fc-front { background:var(--card); }
        .fc-back { background:linear-gradient(135deg,var(--primary),var(--cyan)); color:#fff; transform:rotateY(180deg); }
        .fc-hint { font-size:.72rem; text-transform:uppercase; letter-spacing:.06em; opacity:.5; margin-bottom:12px; }
        .fc-text { font-size:1.15rem; font-weight:600; text-align:center; line-height:1.35; }
        .fc-controls { display:flex; gap:10px; justify-content:center; margin-top:16px; }
        .fc-btn { padding:10px 24px; border-radius:8px; font-weight:600; font-size:.9rem; cursor:pointer; border:2px solid; transition:all .15s; background:var(--card); }
        .fc-btn.hard { color:var(--red); border-color:var(--red); }
        .fc-btn.hard:hover { background:var(--red-lt); }
        .fc-btn.ok { color:var(--gold); border-color:var(--gold); }
        .fc-btn.ok:hover { background:var(--gold-lt); }
        .fc-btn.easy { color:var(--green); border-color:var(--green); }
        .fc-btn.easy:hover { background:var(--green-lt); }
        .prog-wrap { margin-bottom:20px; }
        .prog-track { height:6px; background:var(--border); border-radius:99px; overflow:hidden; }
        .prog-fill { height:100%; border-radius:99px; background:var(--primary); transition:width .3s; }
    </style>
</head>
<body style="background:var(--bg);">
<div class="study-wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <h2 style="font-size:1.1rem;font-weight:700;">Flashcard Study</h2>
        <a th:href="@{/flashcards}" class="btn btn-ghost btn-sm">&larr; Back</a>
    </div>

    <div th:if="${cards != null and !#lists.isEmpty(cards)}">
        <div class="prog-wrap">
            <div style="display:flex;justify-content:space-between;font-size:.78rem;color:var(--ink-3);margin-bottom:4px;">
                <span id="cardCounter">1 / <span th:text="${#lists.size(cards)}">0</span></span>
                <span>Tap card to flip</span>
            </div>
            <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
        </div>

        <div th:each="card, stat : ${cards}"
             th:id="'card-' + ${stat.index}"
             th:style="${stat.index > 0} ? 'display:none' : ''">
            <div class="fc-scene">
                <div class="fc-inner" onclick="flipCard(this)">
                    <div class="fc-face fc-front">
                        <div class="fc-hint">QUESTION</div>
                        <div class="fc-text" th:text="${card.frontText}">Front</div>
                    </div>
                    <div class="fc-face fc-back">
                        <div class="fc-hint">ANSWER</div>
                        <div class="fc-text" th:text="${card.backText}">Back</div>
                    </div>
                </div>
            </div>

            <div class="fc-controls" style="display:none;" th:id="'controls-' + ${stat.index}">
                <form th:action="@{/flashcards/{id}/rate(id=${card.cardId})}" method="post" style="display:inline">
                    <input type="hidden" name="rating" value="hard">
                    <button type="submit" class="fc-btn hard">Hard</button>
                </form>
                <form th:action="@{/flashcards/{id}/rate(id=${card.cardId})}" method="post" style="display:inline">
                    <input type="hidden" name="rating" value="ok">
                    <button type="submit" class="fc-btn ok">OK</button>
                </form>
                <form th:action="@{/flashcards/{id}/rate(id=${card.cardId})}" method="post" style="display:inline">
                    <input type="hidden" name="rating" value="easy">
                    <button type="submit" class="fc-btn easy">Easy</button>
                </form>
            </div>
        </div>
    </div>

    <div th:if="${cards == null or #lists.isEmpty(cards)}"
         class="card" style="text-align:center;padding:60px;">
        <div style="font-size:3rem;margin-bottom:16px;">&#127881;</div>
        <h3 style="margin-bottom:8px;">All caught up!</h3>
        <p style="color:var(--ink-3);margin-bottom:20px;">No cards due for review today.</p>
        <a th:href="@{/flashcards}" class="btn btn-primary">Back to Flashcards</a>
    </div>
</div>

<script>
    let currentCard = 0;
    const totalCards = document.querySelectorAll('[id^="card-"]').length;

    function flipCard(el) {
      el.classList.toggle('flipped');
      const idx = el.closest('[id^="card-"]').id.split('-')[1];
      document.getElementById('controls-' + idx).style.display = 'flex';
    }

    function updateProgress() {
      const pct = totalCards > 0 ? (currentCard / totalCards * 100) : 0;
      document.getElementById('progFill').style.width = pct + '%';
      document.getElementById('cardCounter').textContent = (currentCard + 1) + ' / ' + totalCards;
    }
</script>
</body>
</html>
