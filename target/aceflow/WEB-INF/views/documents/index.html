<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.documents}">Documents - AceFlow</title>
    <link rel="stylesheet" th:href="@{/static/css/main.css}">
    <style>
        .upload-zone { border:2px dashed var(--border); border-radius:12px; padding:40px; text-align:center; cursor:pointer; transition:border-color .15s; margin-bottom:20px; }
        .upload-zone:hover { border-color:var(--primary); }
        .doc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; }
        .doc-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; cursor:pointer; transition:box-shadow .15s; }
        .doc-card:hover { box-shadow:var(--shadow-md); }
        .doc-thumb { height:80px; display:flex; align-items:center; justify-content:center; font-size:2rem; background:var(--bg); }
        .doc-body { padding:12px; }
        .doc-name { font-weight:600; font-size:.85rem; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .doc-meta { font-size:.72rem; color:var(--ink-3); }
    </style>
</head>
<body>
<div class="app">
    <nav class="nav">
        <div class="nav-logo">
            <span class="logo-text"><span class="logo-ace">Ace</span><em class="logo-flow">Flow</em></span>
        </div>
        <div class="nav-section">
            <div class="nav-label" th:text="#{nav.overview}">Overview</div>
            <a class="nav-item" th:href="@{/dashboard}" th:text="#{nav.dashboard}">Dashboard</a>
            <a class="nav-item" th:href="@{/goals}" th:text="#{nav.goals}">Goals</a>
            <a class="nav-item" th:href="@{/studyplan}" th:text="#{nav.plan}">Study Plan</a>
        </div>
        <div class="nav-section">
            <div class="nav-label" th:text="#{nav.tools}">Study Tools</div>
            <a class="nav-item active" th:href="@{/documents}" th:text="#{nav.documents}">Documents</a>
            <a class="nav-item" th:href="@{/tests}" th:text="#{nav.tests}">Tests</a>
            <a class="nav-item" th:href="@{/flashcards}" th:text="#{nav.flashcards}">Flashcards</a>
        </div>
        <div class="nav-section">
            <div class="nav-label" th:text="#{nav.progress}">Progress</div>
            <a class="nav-item" th:href="@{/achievements}" th:text="#{nav.achievements}">Achievements</a>
        </div>
        <div class="nav-footer">
            <div class="nav-user">
                <div class="nav-avatar" th:text="${user != null ? user.initials : 'U'}">U</div>
                <div>
                    <div class="nav-uname" th:text="${user != null ? user.name : 'User'}">User</div>
                    <div class="nav-ulevel"><span th:text="#{common.level}">Level</span> <span th:text="${user != null ? user.level : 1}">1</span></div>
                </div>
            </div>
            <form th:action="@{/auth/logout}" method="post" style="margin-top:8px">
                <button type="submit" class="btn btn-ghost btn-sm" style="width:100%;color:rgba(255,255,255,.5)" th:text="#{common.logout}">Logout</button>
            </form>
        </div>
    </nav>

    <div class="main">
        <header class="topbar">
            <div class="topbar-title" th:text="#{documents.title}">Documents</div>
            <div th:replace="~{fragments/lang-switch :: lang-switch('/documents')}"></div>
            <div class="xp-pill">&#9889; <span th:text="${user != null ? user.xpPoints : 0}">0</span> XP</div>
        </header>

        <div class="content">
            <div class="sec-head">
                <h2 th:text="#{documents.title}">Documents</h2>
                <button class="btn btn-primary" onclick="openModal('modal-upload')" th:text="|+ #{documents.upload}|">+ Upload</button>
            </div>

            <div th:if="${successKey}" class="alert alert-success" th:text="#{${successKey}}"></div>
            <div th:if="${errorKey}" class="alert alert-error" th:text="#{${errorKey}}"></div>

            <div class="upload-zone" onclick="openModal('modal-upload')">
                <div style="font-size:2.5rem;margin-bottom:12px;color:var(--primary);">&#8679;</div>
                <div style="font-weight:600;margin-bottom:6px;" th:text="#{documents.upload.zone}">Upload your study materials</div>
                <div style="color:var(--ink-3);font-size:.85rem;" th:text="#{documents.size.hint}">PDF, DOCX, TXT · Max 50 MB</div>
            </div>

            <div th:if="${documents != null and !#lists.isEmpty(documents)}" class="doc-grid">
                <div th:each="doc : ${documents}" class="doc-card">
                    <div class="doc-thumb">&#128196;</div>
                    <div class="doc-body">
                        <div class="doc-name" th:text="${doc.title}">Document</div>
                        <div class="doc-meta" th:text="${doc.fileType} + ' · ' + ${doc.fileSizeFormatted}">PDF</div>
                    </div>
                </div>
            </div>
            <div th:if="${documents == null or #lists.isEmpty(documents)}" class="card" style="text-align:center;padding:40px;">
                <p style="color:var(--ink-3);" th:text="#{documents.empty}">No documents yet.</p>
            </div>
            <div class="pagination" th:if="${totalPages != null and totalPages > 1}">
                <a th:href="@{/documents(page=${currentPage > 0 ? currentPage - 1 : 0})}"
                   class="pg-btn"
                   th:classappend="${currentPage == 0} ? 'disabled'"
                   th:text="#{pagination.prev}">&laquo;</a>
                <span class="pg-info" th:text="#{pagination.page(${currentPage + 1}, ${totalPages})}">Page 1 of 3</span>
                <a th:href="@{/documents(page=${currentPage < totalPages - 1 ? currentPage + 1 : totalPages - 1})}"
                   class="pg-btn"
                   th:classappend="${currentPage >= totalPages - 1} ? 'disabled'"
                   th:text="#{pagination.next}">&raquo;</a>
            </div>
        </div>
    </div>
</div>

<div class="modal-bg" id="modal-upload">
    <div class="modal">
        <div class="modal-head">
            <h3 th:text="#{documents.upload}">Upload Document</h3>
            <button class="modal-x" onclick="closeModal('modal-upload')">&times;</button>
        </div>
        <form th:action="@{/documents/upload}" method="post" enctype="multipart/form-data">
            <div class="field">
                <label th:text="#{documents.upload.file}">File (PDF, DOCX, TXT)</label>
                <input type="file" name="file" accept=".pdf,.docx,.txt" class="auth-input" required>
            </div>
            <div class="field">
                <label th:text="#{documents.upload.title.label}">Title</label>
                <input type="text" name="title" placeholder="Document title" class="auth-input" required maxlength="200">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-ghost" onclick="closeModal('modal-upload')" th:text="#{common.cancel}">Cancel</button>
                <button type="submit" class="btn btn-primary" th:text="#{documents.upload.btn}">Upload</button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/static/js/main.js}"></script>
</body>
</html>
