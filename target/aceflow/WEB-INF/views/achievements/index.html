<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.achievements}">Achievements - AceFlow</title>
    <link rel="stylesheet" th:href="@{/static/css/main.css}">
    <style>
        .ach-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 12px; }
        .ach-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 14px; text-align: center; transition: all .15s; }
        .ach-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .ach-card.locked { opacity: .4; filter: grayscale(1); }
        .ach-icon { font-size: 2rem; margin-bottom: 8px; }
        .ach-name { font-weight: 600; font-size: .82rem; margin-bottom: 3px; }
        .ach-desc { font-size: .72rem; color: var(--ink-3); }
        .ach-xp { font-size: .75rem; font-weight: 700; color: var(--gold); margin-top: 6px; }
    </style>
</head>
<body>
<div class="app">
    <nav class="nav">
        <div class="nav-logo">
            <span class="logo-text"><span class="logo-ace">Ace</span><em class="logo-flow">Flow</em></span>
        </div>
        <div class="nav-section">
            <div class="nav-label" th:text="#{nav.overview}">Overview</div>
            <a class="nav-item" th:href="@{/dashboard}" th:text="#{nav.dashboard}">Dashboard</a>
            <a class="nav-item" th:href="@{/goals}" th:text="#{nav.goals}">Goals</a>
            <a class="nav-item" th:href="@{/studyplan}" th:text="#{nav.plan}">Study Plan</a>
        </div>
        <div class="nav-section">
            <div class="nav-label" th:text="#{nav.tools}">Study Tools</div>
            <a class="nav-item" th:href="@{/documents}" th:text="#{nav.documents}">Documents</a>
            <a class="nav-item" th:href="@{/tests}" th:text="#{nav.tests}">Tests</a>
            <a class="nav-item" th:href="@{/flashcards}" th:text="#{nav.flashcards}">Flashcards</a>
        </div>
        <div class="nav-section">
            <div class="nav-label" th:text="#{nav.progress}">Progress</div>
            <a class="nav-item active" th:href="@{/achievements}" th:text="#{nav.achievements}">Achievements</a>
        </div>
        <div class="nav-footer">
            <div class="nav-user">
                <div class="nav-avatar" th:text="${user != null ? user.initials : 'U'}">U</div>
                <div>
                    <div class="nav-uname" th:text="${user != null ? user.name : 'User'}">User</div>
                    <div class="nav-ulevel"><span th:text="#{common.level}">Level</span> <span th:text="${user != null ? user.level : 1}">1</span></div>
                </div>
            </div>
            <form th:action="@{/auth/logout}" method="post" style="margin-top:8px">
                <button type="submit" class="btn btn-ghost btn-sm" style="width:100%;color:rgba(255,255,255,.5)" th:text="#{common.logout}">Logout</button>
            </form>
        </div>
    </nav>
    <div class="main">
        <header class="topbar">
            <div class="topbar-title" th:text="#{achievements.title}">Achievements</div>
            <div th:replace="~{fragments/lang-switch :: lang-switch('/achievements')}"></div>
            <div class="xp-pill">&#9889; <span th:text="${user != null ? user.xpPoints : 0}">0</span> XP</div>
        </header>
        <div class="content">
            <div class="sec-head">
                <h2 th:text="#{achievements.title}">Achievements</h2>
                <span style="font-size:.85rem;color:var(--ink-3);" th:text="#{achievements.unlocked(${earnedCount}, ${totalCount})}">0 / 0 unlocked</span>
            </div>
            <div class="ach-grid">
                <div th:each="ach : ${achievements}"
                     class="ach-card"
                     th:classappend="${!ach.earned} ? 'locked'">
                    <div class="ach-icon">&#9733;</div>
                    <div class="ach-name" th:text="${ach.title}">Achievement</div>
                    <div class="ach-desc" th:text="${ach.description}">Description</div>
                    <div class="ach-xp" th:text="'+' + ${ach.xpReward} + ' XP'">+100 XP</div>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/static/js/main.js}"></script>
</body>
</html>
