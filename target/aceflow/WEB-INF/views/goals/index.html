<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.goals}">Goals - AceFlow</title>
    <link rel="stylesheet" th:href="@{/static/css/main.css}">
</head>
<body>
<div class="app">
    <nav class="nav">
        <div class="nav-logo">
            <span class="logo-text"><span class="logo-ace">Ace</span><em class="logo-flow">Flow</em></span>
        </div>
        <div class="nav-section">
            <div class="nav-label" th:text="#{nav.overview}">Overview</div>
            <a class="nav-item" th:href="@{/dashboard}" th:text="#{nav.dashboard}">Dashboard</a>
            <a class="nav-item active" th:href="@{/goals}" th:text="#{nav.goals}">Goals</a>
        </div>
        <div class="nav-section">
            <div class="nav-label" th:text="#{nav.tools}">Study Tools</div>
            <a class="nav-item" th:href="@{/tests}" th:text="#{nav.tests}">Tests</a>
            <a class="nav-item" th:href="@{/flashcards}" th:text="#{nav.flashcards}">Flashcards</a>
        </div>
        <div class="nav-footer">
            <div class="nav-user">
                <div class="nav-avatar" th:text="${user != null ? user.initials : 'U'}">U</div>
                <div>
                    <div class="nav-uname" th:text="${user != null ? user.name : 'User'}">User</div>
                    <div class="nav-ulevel"><span th:text="#{common.level}">Level</span> <span th:text="${user != null ? user.level : 1}">1</span></div>
                </div>
            </div>
            <form th:action="@{/auth/logout}" method="post" style="margin-top:8px">
                <button type="submit" class="btn btn-ghost btn-sm" style="width:100%;color:rgba(255,255,255,.5)" th:text="#{common.logout}">Logout</button>
            </form>
        </div>
    </nav>

    <div class="main">
        <header class="topbar">
            <div class="topbar-title" th:text="#{goals.title}">Goals</div>
            <div th:replace="~{fragments/lang-switch :: lang-switch('/goals')}"></div>
            <div class="xp-pill">&#9889; <span th:text="${user != null ? user.xpPoints : 0}">0</span> XP</div>
            <div class="streak-pill">&#128293; <span th:text="${user != null ? user.streakDays : 0}">0</span></div>
        </header>

        <div class="content">
            <div class="sec-head">
                <h2 th:text="#{goals.title}">Goals</h2>
                <button class="btn btn-primary btn-sm" onclick="openModal('modal-goal')" th:text="|+ #{goals.add}|">+ Add Goal</button>
            </div>

            <div th:if="${successKey}" class="alert alert-success" th:text="#{${successKey}}"></div>

            <div class="goals-list">
                <div th:each="goal : ${goals}" class="goal-card">
                    <div class="goal-chk" th:classappend="${goal.completed} ? 'done'">
                        <form th:if="${!goal.completed}"
                              th:action="@{/goals/{id}/complete(id=${goal.goalId})}"
                              method="post" style="display:inline;margin:0;padding:0">
                            <button type="submit" style="background:none;border:none;cursor:pointer;color:var(--green);font-size:.8rem;">&#10003;</button>
                        </form>
                        <span th:if="${goal.completed}">&#10003;</span>
                    </div>
                    <div class="goal-body">
                        <div class="goal-title" th:classappend="${goal.completed} ? 'done'" th:text="${goal.title}">Goal</div>
                        <div class="goal-info" th:if="${goal.deadline != null}" th:text="${goal.deadline}"></div>
                        <div class="goal-info" th:text="${goal.priority}"></div>
                    </div>
                    <div class="goal-right">
                        <div class="goal-xp" th:text="'+' + ${goal.xpReward} + ' XP'">+XP</div>
                        <form th:action="@{/goals/{id}/delete(id=${goal.goalId})}" method="post" style="margin-top:4px">
                            <button type="submit" class="btn-link-danger">&#128465;</button>
                        </form>
                    </div>
                </div>

                <div th:if="${goals == null or #lists.isEmpty(goals)}" class="empty-state">
                    <p th:text="#{goals.add}">No goals yet.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-bg" id="modal-goal">
    <div class="modal">
        <div class="modal-head">
            <h3 th:text="#{goals.add}">Add Goal</h3>
            <button class="modal-x" onclick="closeModal('modal-goal')">&times;</button>
        </div>
        <form th:action="@{/goals/create}" method="post">
            <div class="field">
                <label th:text="#{goals.goal.title}">Goal description</label>
                <input type="text" name="title" class="auth-input" required maxlength="200">
            </div>
            <div class="field">
                <label th:text="#{goals.deadline}">Deadline (optional)</label>
                <input type="date" name="deadline" class="auth-input">
            </div>
            <div class="field">
                <label>Priority</label>
                <select name="priority" class="auth-input">
                    <option value="LOW">Low</option>
                    <option value="MEDIUM" selected>Medium</option>
                    <option value="HIGH">High</option>
                </select>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-ghost" onclick="closeModal('modal-goal')" th:text="#{common.cancel}">Cancel</button>
                <button type="submit" class="btn btn-primary" th:text="#{goals.add.btn}">Add</button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/static/js/main.js}"></script>
</body>
</html>
