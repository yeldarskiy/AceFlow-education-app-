<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Result - AceFlow</title>
    <link rel="stylesheet" th:href="@{/static/css/main.css}">
    <style>
        .result-wrap { max-width: 480px; margin: 60px auto; text-align: center; padding: 24px; }
        .result-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; box-shadow: var(--shadow-lg); }
        .score-circle { width: 140px; height: 140px; border-radius: 50%; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 800; }
        .score-good { background: var(--green-lt); color: var(--green); border: 4px solid var(--green); }
        .score-mid { background: var(--gold-lt); color: var(--gold); border: 4px solid var(--gold); }
        .score-bad { background: var(--red-lt); color: var(--red); border: 4px solid var(--red); }
    </style>
</head>
<body style="background:var(--bg);">
<div class="result-wrap">
    <div class="result-card">
        <div class="score-circle"
             th:classappend="${score >= 80} ? 'score-good' : (${score >= 60} ? 'score-mid' : 'score-bad')"
             th:text="${score} + '%'">85%</div>
        <h2 style="margin-bottom:8px;" th:text="${testTitle != null ? testTitle : 'Test Complete!'}">Test Complete!</h2>
        <p style="color:var(--ink-3);margin-bottom:24px;">
            <span th:text="${correct}">4</span> correct out of <span th:text="${total}">5</span>
        </p>
        <div style="display:flex;gap:10px;justify-content:center;">
            <a th:href="@{/tests/{id}/start(id=${testId})}" class="btn btn-primary">Retake</a>
            <a th:href="@{/tests}" class="btn btn-ghost">All Tests</a>
        </div>
    </div>
</div>
</body>
</html>
