<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.flashcards}">Flashcards - AceFlow</title>
    <link rel="stylesheet" th:href="@{/static/css/main.css}">
    <style>
        .stats-row { display:flex; gap:16px; margin-bottom:20px; }
        .stat-box { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; flex:1; text-align:center; }
        .stat-box .num { font-size:1.8rem; font-weight:800; }
        .stat-box .lbl { font-size:.75rem; color:var(--ink-3); margin-top:2px; }
    </style>
</head>
<body>
<div class="app">
    <nav class="nav">
        <div class="nav-logo">
            <span class="logo-text"><span class="logo-ace">Ace</span><em class="logo-flow">Flow</em></span>
        </div>
        <div class="nav-section">
            <div class="nav-label" th:text="#{nav.overview}">Overview</div>
            <a class="nav-item" th:href="@{/dashboard}" th:text="#{nav.dashboard}">Dashboard</a>
            <a class="nav-item" th:href="@{/goals}" th:text="#{nav.goals}">Goals</a>
            <a class="nav-item" th:href="@{/studyplan}" th:text="#{nav.plan}">Study Plan</a>
        </div>
        <div class="nav-section">
            <div class="nav-label" th:text="#{nav.tools}">Study Tools</div>
            <a class="nav-item" th:href="@{/documents}" th:text="#{nav.documents}">Documents</a>
            <a class="nav-item" th:href="@{/tests}" th:text="#{nav.tests}">Tests</a>
            <a class="nav-item active" th:href="@{/flashcards}" th:text="#{nav.flashcards}">Flashcards</a>
        </div>
        <div class="nav-section">
            <div class="nav-label" th:text="#{nav.progress}">Progress</div>
            <a class="nav-item" th:href="@{/achievements}" th:text="#{nav.achievements}">Achievements</a>
        </div>
        <div class="nav-footer">
            <div class="nav-user">
                <div class="nav-avatar" th:text="${user != null ? user.initials : 'U'}">U</div>
                <div>
                    <div class="nav-uname" th:text="${user != null ? user.name : 'User'}">User</div>
                    <div class="nav-ulevel"><span th:text="#{common.level}">Level</span> <span th:text="${user != null ? user.level : 1}">1</span></div>
                </div>
            </div>
            <form th:action="@{/auth/logout}" method="post" style="margin-top:8px">
                <button type="submit" style="width:100%;background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);padding:6px;border-radius:6px;cursor:pointer;" th:text="#{common.logout}">Logout</button>
            </form>
        </div>
    </nav>

    <div class="main">
        <header class="topbar">
            <div class="topbar-title" th:text="#{flashcards.title}">Flashcards</div>
            <div th:replace="~{fragments/lang-switch :: lang-switch('/flashcards')}"></div>
            <div class="xp-pill">&#9889; <span th:text="${user != null ? user.xpPoints : 0}">0</span> XP</div>
            <div class="streak-pill">&#128293; <span th:text="${user != null ? user.streakDays : 0}">0</span></div>
        </header>

        <div class="content">
            <div class="sec-head">
                <h2 th:text="#{flashcards.title}">Flashcards</h2>
                <div style="display:flex;gap:8px;">
                    <a th:href="@{/flashcards/study}" class="btn btn-primary" th:text="#{flashcards.study}">Study Now</a>
                    <button class="btn btn-ghost" onclick="openModal('modal-create')" th:text="|+ #{flashcards.create}|">+ Create Card</button>
                </div>
            </div>

            <div th:if="${successKey}" class="alert alert-success" th:text="#{${successKey}}"></div>

            <div class="stats-row">
                <div class="stat-box">
                    <div class="num" th:text="${total}">0</div>
                    <div class="lbl" th:text="#{flashcards.total}">Total Cards</div>
                </div>
                <div class="stat-box">
                    <div class="num" style="color:var(--green);" th:text="${mastered}">0</div>
                    <div class="lbl" th:text="#{flashcards.mastered.label}">Mastered</div>
                </div>
                <div class="stat-box">
                    <div class="num" style="color:var(--primary);" th:text="${total - mastered}">0</div>
                    <div class="lbl" th:text="#{flashcards.hard}">To Review</div>
                </div>
            </div>

            <div th:if="${cards != null and !#lists.isEmpty(cards)}">
                <div class="card">
                    <div style="display:flex;flex-direction:column;gap:8px;">
                        <div th:each="card : ${cards}"
                             style="display:flex;align-items:center;gap:12px;padding:10px;border-bottom:1px solid var(--border);">
                            <div style="flex:1;">
                                <div style="font-weight:600;font-size:.88rem;" th:text="${card.frontText}">Front</div>
                                <div style="font-size:.78rem;color:var(--ink-3);" th:text="${card.backText}">Back</div>
                            </div>
                            <div th:if="${card.mastered}"
                                 style="font-size:.72rem;font-weight:700;color:var(--green);background:var(--green-lt);padding:2px 8px;border-radius:20px;"
                                 th:text="#{flashcards.mastered.label}">Mastered</div>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${cards == null or #lists.isEmpty(cards)}"
                 class="card" style="text-align:center;padding:60px;">
                <div style="font-size:3rem;margin-bottom:16px;">&#9830;</div>
                <div style="font-weight:600;margin-bottom:8px;" th:text="#{flashcards.empty}">No flashcards yet</div>
                <button class="btn btn-primary" onclick="openModal('modal-create')" th:text="|+ #{flashcards.create}|">+ Create First Card</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-bg" id="modal-create">
    <div class="modal">
        <div class="modal-head">
            <h3 th:text="#{flashcards.create}">Create Flashcard</h3>
            <button class="modal-x" onclick="closeModal('modal-create')">&times;</button>
        </div>
        <form th:action="@{/flashcards/create}" method="post">
            <div class="field">
                <label th:text="#{flashcards.question}">Question (Front)</label>
                <textarea name="frontText" class="auth-input" rows="3" required style="resize:vertical;"></textarea>
            </div>
            <div class="field">
                <label th:text="#{flashcards.answer}">Answer (Back)</label>
                <textarea name="backText" class="auth-input" rows="3" required style="resize:vertical;"></textarea>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-ghost" onclick="closeModal('modal-create')" th:text="#{common.cancel}">Cancel</button>
                <button type="submit" class="btn btn-primary" th:text="#{flashcards.create}">Create</button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/static/js/main.js}"></script>
</body>
</html>
