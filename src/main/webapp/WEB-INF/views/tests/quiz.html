<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${test.title} + ' - AceFlow'">Quiz - AceFlow</title>
    <link rel="stylesheet" th:href="@{/static/css/main.css}">
    <style>
        .quiz-wrap { max-width: 700px; margin: 0 auto; padding: 24px; }
        .quiz-header { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .quiz-title { font-size: 1rem; font-weight: 700; }
        .quiz-prog-bar { height: 4px; background: var(--border); border-radius: 99px; margin-bottom: 20px; }
        .quiz-prog-fill { height: 100%; background: var(--primary); border-radius: 99px; transition: width .3s; }
        .question-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 28px; margin-bottom: 16px; }
        .question-num { font-size: .75rem; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-3); margin-bottom: 8px; }
        .question-text { font-size: 1.1rem; font-weight: 600; line-height: 1.4; margin-bottom: 20px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-label { display: flex; align-items: center; gap: 12px; border: 2px solid var(--border); border-radius: 10px; padding: 12px 16px; cursor: pointer; transition: all .15s; font-size: .9rem; }
        .option-label:hover { border-color: var(--primary); background: var(--primary-lt); }
        .option-label input[type=radio] { display: none; }
        .option-label input[type=radio]:checked + .option-key { background: var(--primary); color: #fff; border-color: var(--primary); }
        .option-label:has(input:checked) { border-color: var(--primary); background: var(--primary-lt); }
        .option-key { width: 28px; height: 28px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: .78rem; font-weight: 700; flex-shrink: 0; transition: all .15s; }
        .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--cyan)); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .submit-btn:hover { opacity: .9; }
    </style>
</head>
<body style="background:var(--bg);">
<div class="quiz-wrap">
    <div class="quiz-header">
        <div class="quiz-title" th:text="${test.title}">Test</div>
        <a th:href="@{/tests}" class="btn btn-ghost btn-sm">&larr; Back</a>
    </div>

    <div class="quiz-prog-bar">
        <div class="quiz-prog-fill" style="width:0%" id="progFill"></div>
    </div>

    <form th:action="@{/tests/{id}/submit(id=${test.testId})}" method="post">
        <div th:each="question, qStat : ${questions}" class="question-card">
            <div class="question-num" th:text="'Question ' + ${qStat.index + 1} + ' of ' + ${qStat.size}">Q1</div>
            <div class="question-text" th:text="${question.questionText}">Question text</div>
            <div class="options">
                <label class="option-label" th:if="${question.optionA != null}">
                    <input type="radio" th:name="'q_' + ${question.questionId}" value="A" required>
                    <div class="option-key">A</div>
                    <span th:text="${question.optionA}">Option A</span>
                </label>
                <label class="option-label" th:if="${question.optionB != null}">
                    <input type="radio" th:name="'q_' + ${question.questionId}" value="B">
                    <div class="option-key">B</div>
                    <span th:text="${question.optionB}">Option B</span>
                </label>
                <label class="option-label" th:if="${question.optionC != null}">
                    <input type="radio" th:name="'q_' + ${question.questionId}" value="C">
                    <div class="option-key">C</div>
                    <span th:text="${question.optionC}">Option C</span>
                </label>
                <label class="option-label" th:if="${question.optionD != null}">
                    <input type="radio" th:name="'q_' + ${question.questionId}" value="D">
                    <div class="option-key">D</div>
                    <span th:text="${question.optionD}">Option D</span>
                </label>
            </div>
        </div>

        <button type="submit" class="submit-btn">Submit Test</button>
    </form>
</div>
</body>
</html>
