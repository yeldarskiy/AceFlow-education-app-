<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="#{nav.dashboard}">Dashboard - AceFlow</title>
<link rel="stylesheet" th:href="@{/static/css/main.css}">
</head>
<body>
<div class="app">
  <nav class="nav">
    <div class="nav-logo">
      <span class="logo-text"><span class="logo-ace">Ace</span><em class="logo-flow">Flow</em></span>
    </div>
    <div class="nav-section">
      <div class="nav-label" th:text="#{nav.overview}">Overview</div>
      <a class="nav-item active" th:href="@{/dashboard}" th:text="#{nav.dashboard}">Dashboard</a>
      <a class="nav-item" th:href="@{/goals}" th:text="#{nav.goals}">Goals</a>
    </div>
    <div class="nav-section">
      <div class="nav-label" th:text="#{nav.tools}">Tools</div>
      <a class="nav-item" th:href="@{/tests}" th:text="#{nav.tests}">Tests</a>
      <a class="nav-item" th:href="@{/flashcards}" th:text="#{nav.flashcards}">Flashcards</a>
    </div>
    <div class="nav-footer">
      <div class="nav-user">
        <div class="nav-avatar" th:text="${user.initials}">Y</div>
        <div>
          <div class="nav-uname" th:text="${user.name}">User</div>
          <div class="nav-ulevel">Level <span th:text="${user.level}">1</span></div>
        </div>
      </div>
      <form th:action="@{/auth/logout}" method="post" style="margin-top:8px">
        <button type="submit" class="btn btn-ghost btn-sm" style="width:100%;color:rgba(255,255,255,.5)">Logout</button>
      </form>
    </div>
  </nav>

  <div class="main">
    <header class="topbar">
      <div class="topbar-title" th:text="#{nav.dashboard}">Dashboard</div>
      <div class="lang-switch">
        <a th:href="@{/dashboard(lang=en)}" class="lang-btn" th:classappend="${#locale.language == 'en'} ? 'active'">EN</a>
        <a th:href="@{/dashboard(lang=ru)}" class="lang-btn" th:classappend="${#locale.language == 'ru'} ? 'active'">RU</a>
        <a th:href="@{/dashboard(lang=kz)}" class="lang-btn" th:classappend="${#locale.language == 'kz'} ? 'active'">KZ</a>
      </div>
      <div class="xp-pill">&#9889; <span th:text="${user.xpPoints}">0</span> XP</div>
      <div class="streak-pill">&#128293; <span th:text="${user.streakDays}">0</span></div>
    </header>

    <div class="content">
      <div class="dash-hero">
        <div>
          <h1 th:text="#{dashboard.greeting(${user.name})}">Hello!</h1>
          <p th:text="#{dashboard.subtitle(${#lists.size(goals)})}">Keep going!</p>
          <div style="display:flex;gap:8px;margin-top:14px;">
            <a th:href="@{/tests}" class="btn btn-gold btn-sm" th:text="#{dashboard.start.test}">Start Test</a>
          </div>
        </div>
        <div class="dash-xp">
          <div class="big" th:text="${user.xpPoints}">0</div>
          <div class="lbl" th:text="#{dashboard.xp.total}">XP TOTAL</div>
        </div>
      </div>

      <!-- Goals summary -->
      <div class="card" style="margin-top:20px;">
        <div class="card-title" th:text="#{nav.goals}">Goals</div>
        <div th:each="goal : ${goals}" class="task-item">
          <div class="task-chk" th:classappend="${goal.completed} ? 'done'">
            <span th:if="${goal.completed}">&#10003;</span>
          </div>
          <div style="flex:1">
            <div class="task-name" th:classappend="${goal.completed} ? 'done'" th:text="${goal.title}">Goal</div>
          </div>
          <div class="task-xp" th:text="'+' + ${goal.xpReward} + ' XP'">+XP</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/static/js/main.js}"></script>
</body>
</html>
