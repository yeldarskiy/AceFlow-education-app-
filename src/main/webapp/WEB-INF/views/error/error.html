<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8">
<title>Error - AceFlow</title>
<link rel="stylesheet" th:href="@{/static/css/main.css}">
</head>
<body class="auth-body">
<div class="auth-page">
  <div class="auth-box" style="text-align:center;">
    <div class="auth-logo">
      <span class="logo-text"><span class="logo-ace">Ace</span><em class="logo-flow">Flow</em></span>
    </div>
    <h2 th:text="${status}">Error</h2>
    <p th:text="#{${errorKey} ?: 'common.error.generic'}">Something went wrong.</p>
    <a th:href="@{/dashboard}" class="btn btn-primary" style="margin-top:16px;display:inline-flex">Go to Dashboard</a>
  </div>
</div>
</body>
</html>
