# ── Database ──────────────────────────────────────────────────────────────
db.url=jdbc:postgresql://localhost:5432/aceflow?useUnicode=true&characterEncoding=UTF-8
db.username=postgres
db.password=postgres
db.driver=org.postgresql.Driver

# ── Connection Pool ────────────────────────────────────────────────────────
pool.size=10
pool.timeout=30000

# ── Application ───────────────────────────────────────────────────────────
app.name=AceFlow
app.version=1.0.0
app.default.language=en
app.session.timeout=1800

# ── XP & Gamification ─────────────────────────────────────────────────────
xp.per.test.question=10
xp.per.flashcard.mastered=5
xp.per.goal.completed=100
xp.streak.bonus=50
