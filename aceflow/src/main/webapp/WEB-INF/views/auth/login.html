<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="#{auth.title}">Sign In - AceFlow</title>
<link rel="stylesheet" th:href="@{/static/css/main.css}">
</head>
<body class="auth-body">
<div class="auth-page">
  <div class="auth-box">

    <!-- Language switcher -->
    <div class="auth-lang">
      <a th:href="@{/auth/login(lang=en)}" class="lang-btn" th:classappend="${#locale.language == 'en'} ? 'active'">EN</a>
      <a th:href="@{/auth/login(lang=ru)}" class="lang-btn" th:classappend="${#locale.language == 'ru'} ? 'active'">RU</a>
      <a th:href="@{/auth/login(lang=kz)}" class="lang-btn" th:classappend="${#locale.language == 'kz'} ? 'active'">KZ</a>
    </div>

    <div class="auth-logo">
      <span class="logo-text"><span class="logo-ace">Ace</span><em class="logo-flow">Flow</em></span>
    </div>

    <h1 class="auth-title" th:text="#{auth.title}">Sign in to your account</h1>
    <p class="auth-sub" th:text="#{auth.subtitle}">Prepare for any exam with AI</p>

    <!-- Flash messages -->
    <div th:if="${successKey}" class="alert alert-success" th:text="#{${successKey}}"></div>
    <div th:if="${errorKey}" class="alert alert-error" th:text="#{${errorKey}}"></div>

    <!-- Login form: POST-Redirect-GET prevents F5 resubmission -->
    <form th:action="@{/auth/login}" method="post" th:object="${loginForm}" novalidate>
      <div class="field">
        <label th:for="email" th:text="#{auth.email}">Email</label>
        <input type="email" id="email" name="email" class="auth-input"
               placeholder="name@example.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label th:for="password" th:text="#{auth.password}">Password</label>
        <input type="password" id="password" name="password" class="auth-input"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="auth-btn" th:text="#{auth.signin}">Sign In</button>
    </form>

    <div class="auth-divider" th:text="#{auth.or}">or</div>
    <a th:href="@{/auth/register}" class="auth-btn auth-btn-outline" th:text="#{auth.create.account}">Create Account</a>
  </div>
</div>
</body>
</html>
